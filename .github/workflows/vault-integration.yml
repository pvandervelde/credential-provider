name: Vault Integration Tests

on:
    schedule:
        - cron: "0 5 * * 2" # Tuesdays at 05:00 UTC
    workflow_dispatch:

jobs:
    vault-integration:
        name: Vault integration tests
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

            - name: Install Rust toolchain
              uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

            - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

            - name: Start Vault dev server
              run: |
                  docker run --detach \
                    --cap-add=IPC_LOCK \
                    --publish 8200:8200 \
                    --env VAULT_DEV_ROOT_TOKEN_ID=root \
                    --env VAULT_DEV_LISTEN_ADDRESS=0.0.0.0:8200 \
                    --name vault-dev \
                    hashicorp/vault:latest \
                    server -dev

            - name: Wait for Vault to be ready
              run: |
                  for i in $(seq 1 30); do
                    if curl --silent --fail http://127.0.0.1:8200/v1/sys/health > /dev/null 2>&1; then
                      echo "Vault is ready"
                      break
                    fi
                    echo "Waiting for Vault... ($i/30)"
                    sleep 2
                  done

            - name: Seed Vault test fixtures
              env:
                  VAULT_ADDR: http://127.0.0.1:8200
                  VAULT_TOKEN: root
              run: |
                  curl --silent --fail \
                    --header "X-Vault-Token: $VAULT_TOKEN" \
                    --header "Content-Type: application/json" \
                    --request POST \
                    --data '{"data":{"username":"test-user","password":"test-pass"}}' \
                    "$VAULT_ADDR/v1/secret/data/test-credential"

            - name: Run Vault integration tests
              env:
                  VAULT_ADDR: http://127.0.0.1:8200
                  VAULT_TOKEN: root
              run: cargo test -p credential-provider --features vault -- --include-ignored
