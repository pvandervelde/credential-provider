name: Fuzz Testing

on:
    schedule:
        - cron: "0 4 * * 3" # Wednesdays at 04:00 UTC
    workflow_dispatch:
        inputs:
            duration:
                description: "Fuzz duration per target in seconds"
                default: "300"
                required: false

jobs:
    fuzz:
        name: cargo-fuzz
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

            - name: Install nightly Rust toolchain
              uses: dtolnay/rust-toolchain@5b842231ba77f5c045dba54ac5560fed2db780e2 # nightly

            - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

            - name: Install cargo-fuzz
              run: cargo install cargo-fuzz

            - name: List fuzz targets
              id: list-targets
              run: |
                  if [ -d fuzz ]; then
                    TARGETS=$(cd fuzz && cargo fuzz list 2>/dev/null || echo "")
                  else
                    TARGETS=""
                    echo "No fuzz directory found — add targets under fuzz/fuzz_targets/ to enable fuzzing"
                  fi
                  echo "targets=$TARGETS" >> "$GITHUB_OUTPUT"

            - name: Run fuzz targets
              if: steps.list-targets.outputs.targets != ''
              run: |
                  DURATION="${{ github.event.inputs.duration || 300 }}"
                  while IFS= read -r target; do
                    [ -z "$target" ] && continue
                    cd fuzz && cargo fuzz run "$target" -- -max_total_time="$DURATION" && cd ..
                  done <<< "${{ steps.list-targets.outputs.targets }}"

            - name: Upload fuzz artifacts
              if: always()
              uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
              with:
                  name: fuzz-artifacts-${{ github.sha }}
                  path: fuzz/artifacts/
                  if-no-files-found: ignore
