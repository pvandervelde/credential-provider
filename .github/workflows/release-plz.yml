name: Release-plz Release

on:
    pull_request:
        types: [closed]
        branches:
            - master

# Prevent duplicate release runs if the event fires more than once.
concurrency:
    group: release-plz-release-${{ github.event.pull_request.number }}
    cancel-in-progress: false

jobs:
    release-plz-release:
        name: Release-plz release
        # Only run when the release PR (labelled "release" by release-plz) is merged.
        if: github.event.pull_request.merged == true && contains(github.event.pull_request.labels.*.name, 'release')
        runs-on: ubuntu-latest
        permissions:
            contents: write
            pull-requests: read
        steps:
            # Generating a GitHub token so that tags and releases created by
            # release-plz can trigger downstream workflows.
            - name: Generate GitHub token
              uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3
              id: generate-token
              with:
                  app-id: ${{ secrets.RELEASE_PLZ_APP_ID }}
                  private-key: ${{ secrets.RELEASE_PLZ_APP_PRIVATE_KEY }}

            - name: Checkout repository
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
              with:
                  fetch-depth: 0
                  token: ${{ steps.generate-token.outputs.token }}

            - name: Install Rust toolchain
              uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

            - name: Run release-plz
              uses: release-plz/action@1528104d2ca23787631a1c1f022abb64b34c1e11 # v0.5
              with:
                  command: release
              env:
                  GITHUB_TOKEN: ${{ steps.generate-token.outputs.token }}
                  CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
